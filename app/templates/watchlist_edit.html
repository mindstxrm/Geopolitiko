{% extends "base.html" %}

{% block title %}Edit {{ watchlist.name }} — Watchlist — Geopolitical News{% endblock %}

{% block content %}
  <section class="analysis-section">
    <a href="{{ url_for('main.watchlist_detail', watchlist_id=watchlist.id) }}" class="back-link">← {{ watchlist.name }}</a>
    <h1 class="page-title">Edit watchlist</h1>
    <form method="post" class="inline-form">
      <label>
        Name
        <input type="text" name="name" value="{{ watchlist.name }}" required>
      </label>
      <label>
        Topics (comma-separated)
        <input type="text" name="topics" value="{{ (watchlist.topics_list or [])|join(', ') }}" placeholder="e.g. China, Russia, Ukraine">
      </label>
      <div class="form-actions">
        <button type="submit">Save</button>
        <a href="{{ url_for('main.watchlist_detail', watchlist_id=watchlist.id) }}" class="btn btn-secondary">Cancel</a>
      </div>
    </form>
  </section>
{% endblock %}
