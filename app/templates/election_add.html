{% extends "base.html" %}
{% block title %}Add election — Geopolitical Terminal{% endblock %}
{% block content %}
  <h1 class="page-title">Add election</h1>
  <p class="page-intro"><a href="{{ url_for('main.approval_protests') }}#elections">← Election calendars</a></p>

  <form method="post" class="diplomacy-form">
    <label for="country_code">Country code *</label>
    <input type="text" id="country_code" name="country_code" required maxlength="10" placeholder="e.g. USA" list="country_codes">
    <datalist id="country_codes">{% for c in (countries or []) %}<option value="{{ c.country_code }}">{{ c.country_name }}</option>{% endfor %}</datalist>
    <label for="country_name">Country name *</label>
    <input type="text" id="country_name" name="country_name" required placeholder="e.g. United States" list="country_names">
    <datalist id="country_names">{% for c in (countries or []) %}<option value="{{ c.country_name }}">{{ c.country_code }}</option>{% endfor %}</datalist>
    <label for="election_type">Election type *</label>
    <select id="election_type" name="election_type" required>
      {% for et in election_types %}
      <option value="{{ et }}">{{ et }}</option>
      {% endfor %}
    </select>
    <label for="date_planned">Date planned *</label>
    <input type="month" id="date_planned" name="date_planned" required>
    <label for="status">Status</label>
    <select id="status" name="status">
      <option value="">—</option>
      {% for s in election_statuses %}
      <option value="{{ s }}">{{ s }}</option>
      {% endfor %}
    </select>
    <label for="notes">Notes</label>
    <textarea id="notes" name="notes" rows="2" placeholder="e.g. National Assembly, Lok Sabha"></textarea>
    <button type="submit">Add</button>
  </form>
{% endblock %}
