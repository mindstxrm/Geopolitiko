{% extends "base.html" %}
{% block title %}Add approval rating — Geopolitical Terminal{% endblock %}
{% block content %}
  <h1 class="page-title">Add approval rating</h1>
  <p class="page-intro"><a href="{{ url_for('main.approval_protests') }}">← Approval & protests</a></p>

  <form method="post" class="diplomacy-form" action="{{ url_for('main.approval_add') }}">
    <label for="country_code">Country code *</label>
    <input type="text" id="country_code" name="country_code" required maxlength="10" placeholder="e.g. USA" list="country_codes">
    <datalist id="country_codes">{% for c in (countries or []) %}<option value="{{ c.country_code }}">{{ c.country_name }}</option>{% endfor %}</datalist>
    <label for="country_name">Country name *</label>
    <input type="text" id="country_name" name="country_name" required placeholder="e.g. United States" list="country_names">
    <datalist id="country_names">{% for c in (countries or []) %}<option value="{{ c.country_name }}">{{ c.country_code }}</option>{% endfor %}</datalist>
    <label for="subject">Subject *</label>
    <input type="text" id="subject" name="subject" required placeholder="e.g. President, Government">
    <label for="approval_pct">Approval % *</label>
    <input type="number" id="approval_pct" name="approval_pct" required min="0" max="100" step="0.1" placeholder="e.g. 42">
    <label for="poll_date">Poll date</label>
    <input type="date" id="poll_date" name="poll_date" placeholder="YYYY-MM-DD">
    <label for="source">Source</label>
    <input type="text" id="source" name="source" placeholder="e.g. Gallup">
    <label for="poll_url">Poll URL</label>
    <input type="url" id="poll_url" name="poll_url" placeholder="https://…">
    <label for="sample_size">Sample size</label>
    <input type="number" id="sample_size" name="sample_size" min="0" placeholder="e.g. 1000">
    <button type="submit">Add</button>
  </form>
{% endblock %}
