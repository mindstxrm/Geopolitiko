{% extends "base.html" %}
{% block title %}Log in — Geopolitical Terminal{% endblock %}
{% block content %}
<div class="auth-page">
  <nav class="breadcrumbs" aria-label="Breadcrumb">
    <a href="{{ url_for('main.situation_room') }}">Home</a> <span class="breadcrumb-sep">›</span> Log in
  </nav>
  <h1 class="page-title">Log in</h1>
  <form method="post" action="{{ url_for('main.login') }}" class="auth-form">
    <label for="username">Username</label>
    <input type="text" id="username" name="username" required autocomplete="username" value="{{ request.form.get('username', '') }}">
    <label for="password">Password</label>
    <input type="password" id="password" name="password" required autocomplete="current-password">
    <label class="auth-remember">
      <input type="checkbox" name="remember"> Remember me
    </label>
    <button type="submit" class="btn btn-primary">Log in</button>
  </form>
  <p class="auth-footer">Don't have an account? <a href="{{ url_for('main.register') }}">Register</a></p>
</div>
{% endblock %}
